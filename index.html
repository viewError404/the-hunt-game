<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE HUNT - Real Life AR Game Prototype</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, sans-serif; user-select: none; }
        body { background-color: #121214; color: #ffffff; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; }
        .phone-frame { width: 100vw; height: 100vh; max-width: 420px; max-height: 840px; background-color: #000000; position: relative; overflow: hidden; border: 4px solid #27272a; border-radius: 24px; display: flex; flex-direction: column; }
        .view { display: none; width: 100%; height: 100%; position: absolute; top: 0; left: 0; flex-direction: column; }
        .view.active { display: flex; }
        .status-badge { position: absolute; top: 16px; left: 16px; background-color: rgba(34, 197, 94, 0.2); color: #22c55e; border: 1px solid #22c55e; padding: 4px 12px; border-radius: 8px; font-size: 14px; font-weight: bold; z-index: 10; }
        .status-badge.dead { background-color: rgba(239, 68, 68, 0.2); color: #ef4444; border: 1px solid #ef4444; }
        .map-toggle-btn { position: absolute; top: 16px; right: 16px; width: 40px; height: 40px; background-color: rgba(0,0,0,0.6); border: 1px solid #3f3f46; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 20px; cursor: pointer; z-index: 10; }
        .camera-bg { position: absolute; width: 100%; height: 100%; z-index: 1; opacity: 0.4; }
        .grid-lines { position: absolute; width: 100%; height: 100%; background: linear-gradient(rgba(255,255,255,0.05) 1px, transparent 1px), linear-gradient(90deg, rgba(255,255,255,0.05) 1px, transparent 1px); background-size: 40px 40px; z-index: 2; }
        .ui-layer { position: relative; z-index: 5; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; }
        .btn { background-color: #2563eb; color: white; padding: 14px 24px; border-radius: 12px; font-size: 16px; font-weight: bold; border: none; cursor: pointer; text-align: center; width: 100%; margin-bottom: 10px; }
        .btn-secondary { background-color: #27272a; border: 1px solid #3f3f46; }
        .action-btn-main { width: 140px; height: 140px; border-radius: 50%; background: radial-gradient(circle, #ef4444 0%, #b91c1c 100%); border: 4px solid #ffffff; color: white; font-size: 24px; font-weight: bold; display: flex; justify-content: center; align-items: center; cursor: pointer; position: absolute; bottom: 40px; left: calc(50% - 70px); z-index: 15; }
        .action-btn-sub { width: 60px; height: 60px; border-radius: 50%; background-color: #27272a; border: 2px solid #52525b; color: white; font-size: 16px; font-weight: bold; display: flex; justify-content: center; align-items: center; cursor: pointer; position: absolute; bottom: 50px; right: 30px; z-index: 15; }
        .action-btn-sub-left { width: 60px; height: 60px; border-radius: 50%; background-color: #27272a; border: 2px solid #52525b; color: white; font-size: 16px; font-weight: bold; display: flex; justify-content: center; align-items: center; cursor: pointer; position: absolute; bottom: 50px; left: 30px; z-index: 15; }
        .cooldown-bar { position: absolute; bottom: 20px; left: 20px; background-color: rgba(0,0,0,0.7); border: 1px solid #3f3f46; padding: 4px 10px; border-radius: 6px; font-size: 12px; display: flex; gap: 8px; z-index: 15; }
        .cooldown-item { color: #ef4444; font-weight: bold; }
        .lobby-box { background-color: #18181b; border: 1px solid #27272a; border-radius: 16px; padding: 20px; width: 100%; margin-bottom: 20px; }
        .member-row { display: flex; align-items: center; padding: 10px 0; border-bottom: 1px solid #27272a; }
        .member-avatar { width: 36px; height: 36px; border-radius: 50%; background-color: #3f3f46; margin-right: 12px; display: flex; justify-content: center; align-items: center; font-weight: bold; }
        .map-view { width: 100%; height: 100%; background-color: #111827; background-image: radial-gradient(#1f2937 2px, transparent 2px); background-size: 24px 24px; position: relative; }
        .map-marker { position: absolute; width: 16px; height: 16px; background-color: #3b82f6; border-radius: 50%; border: 2px solid white; transform: translate(-50%, -50%); }
        .map-marker.quest { background-color: #eab308; }
        .ready-overlay-btn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 120px; height: 120px; border-radius: 50%; background-color: #22c55e; border: 4px solid white; color: white; font-size: 20px; font-weight: bold; display: flex; justify-content: center; align-items: center; cursor: pointer; z-index: 30; }
        .settings-overlay { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.85); z-index: 50; padding: 30px; flex-direction: column; justify-content: center; }
        .settings-overlay.active { display: flex; }
        .input-group { margin-bottom: 20px; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 14px; color: #a1a1aa; }
        .input-group input[type="range"] { width: 100%; accent-color: #2563eb; }
        .range-val { float: right; color: #2563eb; font-weight: bold; }
        .header-title { font-size: 24px; font-weight: bold; text-align: center; margin-bottom: 20px; text-transform: uppercase; }
        .header-title span { color: #dc2626; }
        .top-info-bar { position: absolute; top: 16px; left: 90px; right: 90px; text-align: center; z-index: 10; font-size: 16px; font-weight: bold; background: rgba(0,0,0,0.6); padding: 4px 8px; border-radius: 6px; border: 1px solid #27272a; }
        .proto-picker { position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%); display: flex; background: #18181b; padding: 4px; border-radius: 8px; gap: 4px; z-index: 100; border: 1px solid #3f3f46; font-size: 11px; }
        .proto-picker span { padding: 4px 8px; cursor: pointer; border-radius: 4px; }
        .proto-picker span.active { background-color: #2563eb; font-weight: bold; }
    </style>
</head>
<body>
    <div class="phone-frame">
        <div class="proto-picker" id="rolePicker">
            <span class="active" onclick="switchRole('survivor')">คนธรรมดา</span>
            <span onclick="switchRole('police')">ตำรวจ</span>
            <span onclick="switchRole('killer')">ฆาตกร</span>
            <span onclick="switchRole('dead')">ตายแล้ว</span>
        </div>

        <div class="view active" id="viewLobby">
            <div class="ui-layer">
                <div>
                    <div class="header-title" style="margin-top:20px;">ห้องพักคอย <span>THE HUNT</span></div>
                    <div class="lobby-box">
                        <div style="font-size:14px; color:#a1a1aa; margin-bottom:10px;">รายชื่อสมาชิกในพื้นที่</div>
                        <div class="member-row"><div class="member-avatar" style="color:#eab308">P1</div> คุณ (Host)</div>
                        <div class="member-row"><div class="member-avatar">P2</div> เพื่อน A</div>
                        <div class="member-row"><div class="member-avatar">P3</div> เพื่อน B</div>
                    </div>
                </div>
                <div style="margin-bottom: 40px;">
                    <button class="btn" onclick="navigateTo('viewSpawnMap')">เริ่มเกม (สุ่มจุดเกิด)</button>
                    <div style="text-align: center; margin-top: 5px; cursor: pointer; color: #a1a1aa;" onclick="toggleSettings(true)">
                        <span>⚙️</span> <span style="font-size: 14px;">ตั้งค่าระยะและเวลา</span>
                    </div>
                </div>
            </div>
        </div>

        <div class="view" id="viewSpawnMap">
            <div class="map-view">
                <div class="top-info-bar">เดินไปที่จุดสุ่มเกิดของคุณ</div>
                <div class="map-marker" style="top: 45%; left: 40%; background-color:#10b981;"></div>
                <div class="ready-overlay-btn" onclick="startGameLive()">กดพร้อม</div>
            </div>
        </div>

        <div class="view" id="viewGameplay">
            <div class="grid-lines"></div>
            <div class="camera-bg" style="background: radial-gradient(circle, #2d3748 0%, #1a202c 100%);"></div>
            <div class="status-badge" id="hudBadge">ชีวิต</div>
            <div class="map-toggle-btn" onclick="toggleDigitalMap()">🗺️</div>
            <div class="top-info-bar" id="gameTimer">08:00</div>
            <div class="ui-layer" id="gameUiOverlay"></div>

            <div class="view" id="digitalMapOverlay" style="background:#0f172a; z-index: 40;">
                <div class="map-view">
                    <div class="map-toggle-btn" onclick="toggleDigitalMap()" style="background:#ef4444; border:none;">❌</div>
                    <div class="top-info-bar">แผนที่พิกัดดิจิทัล</div>
                    <div class="map-marker quest" style="top: 20%; left: 20%;" id="q1"></div>
                    <div class="map-marker quest" style="top: 50%; left: 45%;" id="q2"></div>
                </div>
            </div>
        </div>

        <div class="view" id="viewSpectator">
            <div class="grid-lines"></div>
            <div class="status-badge dead">ตายแล้ว 💀</div>
            <div class="top-info-bar">ระบบกล้องวงจรปิด</div>
            <div style="display:flex; flex-direction:column; justify-content:center; align-items:center; height:100%; padding:40px; text-align:center;">
                <div style="font-size: 80px; margin-bottom: 20px;">💀</div>
                <div style="font-size: 22px; font-weight:bold; color:#ef4444; margin-bottom:40px;">คุณถูกคัดออก</div>
                <div style="background:rgba(0,0,0,0.6); padding:15px; border-radius:12px; width:100%;">
                    <div style="font-size:12px; color:#a1a1aa; margin-bottom:10px;">สลับดูกล้องคนอื่น</div>
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <button class="btn btn-secondary" style="width:50px; margin:0;" onclick="prevCam()">&lt;</button>
                        <span id="camName" style="font-weight:bold;">กล้องคนที่ 2</span>
                        <button class="btn btn-secondary" style="width:50px; margin:0;" onclick="nextCam()">&gt;</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="settings-overlay" id="settingsSheet">
            <div class="header-title">⚙️ ตั้งค่าเกม</div>
            <div class="input-group">
                <label>ระยะขอบเขตแผนที่: <span class="range-val" id="rangeDistVal">50 ม.</span></label>
                <input type="range" min="20" max="200" value="50" oninput="document.getElementById('rangeDistVal').innerText = this.value + ' ม.'">
            </div>
            <div class="input-group">
                <label>เวลาการเล่น: <span class="range-val" id="rangeTimeVal">8 นาที</span></label>
                <input type="range" min="8" max="30" value="8" oninput="document.getElementById('rangeTimeVal').innerText = this.value + ' นาที'">
            </div>
            <button class="btn" onclick="toggleSettings(false)">บันทึกข้อมูล</button>
        </div>
    </div>

    <script>
        let currentRole = 'survivor'; let camIndex = 2;
        function navigateTo(viewId) { document.querySelectorAll('.view').forEach(v => v.classList.remove('active')); document.getElementById(viewId).classList.add('active'); }
        function toggleSettings(show) { const overlay = document.getElementById('settingsSheet'); if(show) overlay.classList.add('active'); else overlay.classList.remove('active'); }
        function toggleDigitalMap() { const mapOverlay = document.getElementById('digitalMapOverlay'); if(mapOverlay.style.display === 'flex') { mapOverlay.style.display = 'none'; } else { mapOverlay.style.display = 'flex'; const displayStyle = (currentRole === 'killer') ? 'none' : 'block'; document.getElementById('q1').style.display = displayStyle; document.getElementById('q2').style.display = displayStyle; } }
        function startGameLive() { navigateTo('viewGameplay'); switchRole(currentRole); }
        function switchRole(role) { currentRole = role; document.querySelectorAll('#rolePicker span').forEach(s => s.classList.remove('active')); const index = ['survivor', 'police', 'killer', 'dead'].indexOf(role); document.querySelectorAll('#rolePicker span')[index].classList.add('active'); if(role === 'dead') { navigateTo('viewSpectator'); return; } else { navigateTo('viewGameplay'); } const overlay = document.getElementById('gameUiOverlay'); if(role === 'survivor') { overlay.innerHTML = '<div></div><div><div class="action-btn-main" style="background:#eab308;">ทำเควส</div></div>'; } else if(role === 'police') { overlay.innerHTML = '<div class="cooldown-bar"><div class="cooldown-item">ยิง: 5.00s</div></div><div><div class="action-btn-main" style="background:linear-gradient(#3b82f6,#1d4ed8);">ยิง</div><div class="action-btn-sub">เควส</div></div>'; } else if(role === 'killer') { overlay.innerHTML = '<div class="cooldown-bar"><div class="cooldown-item">ปา: 8.00s</div><div class="cooldown-item" style="color:#3b82f6">ส่อง: 3m</div></div><div><div class="action-btn-main">แทง</div><div class="action-btn-sub" style="bottom:120px;">ปา</div><div class="action-btn-sub">ซ่อน</div><div class="action-btn-sub-left">ส่อง</div></div>'; } }
        function prevCam() { camIndex = camIndex <= 1 ? 3 : camIndex - 1; document.getElementById('camName').innerText = "กล้องคนที่ " + camIndex; }
        function nextCam() { camIndex = camIndex >= 3 ? 1 : camIndex + 1; document.getElementById('camName').innerText = "กล้องคนที่ " + camIndex; }
    </script>
</body>
</html>
