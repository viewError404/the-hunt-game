        .timer-display { position: absolute; top: 35px; left: 50%; transform: translateX(-50%); font-size: 20px; font-weight: 900; background: rgba(0,0,0,0.85); padding: 4px 14px; border-radius: 6px; border: 1px solid #3f3f46; z-index: 20; font-family: monospace; }

        .center-circle-btn:active { transform: scale(0.95); }
        .center-circle-btn.disabled { opacity: 0.15; pointer-events: none; filter: grayscale(100%); }

        /* Setup Map Canvas Zone */
        .map-canvas-container { width: 100%; height: 260px; border: 2px dashed #3f3f46; background: #111113; position: relative; border-radius: 8px; margin: 12px 0; overflow: hidden; }
        .canvas-hint { position: absolute; top: 8px; left: 10px; font-size: 11px; color: #a1a1aa; pointer-events: none; }
        .radar-screen { width: 100%; height: 100%; background: #020205; position: relative; }

        .radar-node { position: absolute; width: 12px; height: 12px; border-radius: 50%; transform: translate(-50%, -50%); }
